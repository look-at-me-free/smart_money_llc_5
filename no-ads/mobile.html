<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Wallace Archive Reader · Mobile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Handjet:wght@100..900&family=Rampart+One&family=Rubik+Iso&display=swap" rel="stylesheet">

  <script async src="https://a.magsrv.com/ad-provider.js"></script>
  <script>
    window.AdProvider = window.AdProvider || [];
  </script>

  <style>
    :root{
      --bg:#080a10;
      --bg2:#0d1118;
      --ink:#f7f8fb;
      --muted:rgba(247,248,251,.72);
      --muted2:rgba(247,248,251,.5);
      --stroke:rgba(255,255,255,.1);
      --stroke-strong:rgba(255,255,255,.18);
      --panel:rgba(255,255,255,.045);
      --panel2:rgba(255,255,255,.07);
      --shadow:0 18px 48px rgba(0,0,0,.38);
      --radius:20px;

      --title-font:"Rampart One", system-ui, sans-serif;
      --subtitle-font:"Rubik Iso", system-ui, sans-serif;
      --ui-font:"Handjet", system-ui, sans-serif;
      --pill-font:"Handjet", system-ui, sans-serif;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--ink);
      font-family:var(--ui-font);
      scroll-behavior:smooth;
    }

    body{
      background:
        radial-gradient(860px 520px at 15% 0%, rgba(255,255,255,.06), transparent 58%),
        radial-gradient(700px 460px at 88% 10%, rgba(255,255,255,.035), transparent 55%),
        linear-gradient(180deg, #0d1119 0%, #090b11 42%, #080a10 100%);
      overflow-x:hidden;
    }

    a{ color:inherit; text-decoration:none; }
    button, input{ font:inherit; }

    .page-progress{
      position:fixed;
      inset:0 0 auto 0;
      z-index:9000;
      height:4px;
      background:rgba(255,255,255,.05);
      pointer-events:none;
      backdrop-filter:blur(10px);
    }

    .page-progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, rgba(255,255,255,.95), rgba(210,220,255,.78));
      box-shadow:0 0 18px rgba(255,255,255,.22);
      transition:width .08s linear;
    }

    .hero{
      padding:calc(20px + var(--safe-top)) 14px 12px;
      border-bottom:1px solid var(--stroke);
      background:linear-gradient(to bottom, rgba(255,255,255,.055), rgba(255,255,255,.015) 52%, transparent 100%);
    }

    .hero-inner{
      max-width:840px;
      margin:0 auto;
      display:grid;
      gap:12px;
    }

    .hero-copy{
      text-align:center;
      display:grid;
      gap:8px;
    }

    .eyebrow{
      margin:0;
      color:var(--muted2);
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .hero h1{
      margin:0;
      font-family:var(--title-font);
      font-weight:400;
      font-size:clamp(2rem, 8vw, 3rem);
      line-height:1.04;
      letter-spacing:.01em;
    }

    .hero p{
      margin:0 auto;
      max-width:680px;
      color:var(--muted);
      font-family:var(--subtitle-font);
      font-size:.82rem;
      line-height:1.55;
      letter-spacing:.02em;
    }

    .mobile-shell{
      max-width:840px;
      margin:0 auto;
      padding:12px 14px calc(28px + var(--safe-bottom));
      display:grid;
      gap:12px;
    }

    .search-card,
    .works-card,
    .chapter-meta,
    .note,
    .traversal-shell{
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }

    .search-card{
      padding:12px;
      display:grid;
      gap:10px;
    }

    .search-row{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .search-input{
      width:100%;
      min-height:50px;
      padding:0 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.14);
      outline:none;
      background:rgba(0,0,0,.24);
      color:var(--ink);
      font-size:15px;
      line-height:1.4;
      letter-spacing:.01em;
    }

    .search-input::placeholder{ color:rgba(247,248,251,.42); }
    .search-input:focus{
      border-color:rgba(255,255,255,.3);
      box-shadow:0 0 0 4px rgba(255,255,255,.06);
    }

    .search-stat{
      min-height:42px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.055);
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      text-align:center;
      padding:0 12px;
    }

    .search-results{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .search-result-pill,
    .mobile-work-trigger,
    .mobile-chapter-link,
    .traversal-pill,
    .dial-track,
    .sticky-btn{
      font-family:var(--pill-font);
      letter-spacing:.02em;
    }

    .search-result-pill{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:#fff;
      color:#0d1017;
      padding:9px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
      line-height:1;
      font-weight:600;
      box-shadow:0 8px 24px rgba(255,255,255,.12);
    }

    .search-helper{
      margin:0;
      color:var(--muted2);
      font-size:13px;
      line-height:1.55;
      text-align:center;
    }

    .works-card{
      position:relative;
      padding:14px 46px 14px 14px;
      overflow:hidden;
    }

    .works-header{
      display:grid;
      gap:6px;
      margin-bottom:10px;
      text-align:center;
    }

    .works-title{
      margin:0;
      color:var(--muted2);
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .works-copy{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .works-scroll-shell{
      position:relative;
      max-height:52vh;
      min-height:240px;
      overflow:hidden;
    }

    .works-scroll{
      max-height:52vh;
      overflow-y:auto;
      padding-right:8px;
      scrollbar-width:none;
      -ms-overflow-style:none;
      overscroll-behavior:contain;
      display:grid;
      gap:10px;
    }

    .works-scroll::-webkit-scrollbar{
      width:0;
      height:0;
    }

    .mobile-work-item{
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;
      background:rgba(255,255,255,.04);
      overflow:hidden;
    }

    .mobile-work-item.active{
      border-color:rgba(255,255,255,.2);
      background:rgba(255,255,255,.065);
    }

    .mobile-work-trigger{
      appearance:none;
      width:100%;
      border:0;
      background:transparent;
      color:var(--ink);
      min-height:52px;
      padding:0 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:700;
      text-align:left;
    }

    .mobile-work-trigger .label{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .mobile-work-trigger .count{
      color:var(--muted2);
      font-size:13px;
      white-space:nowrap;
    }

    .mobile-chapters{
      display:none;
      padding:0 10px 10px;
      border-top:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.08);
    }

    .mobile-work-item.open .mobile-chapters{
      display:grid;
      gap:8px;
      padding-top:10px;
    }

    .mobile-chapter-link{
      appearance:none;
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      background:#fff;
      color:#0f1219;
      border-radius:999px;
      min-height:40px;
      padding:0 14px;
      text-align:left;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      box-shadow:0 8px 20px rgba(255,255,255,.08);
    }

    .mobile-chapter-link.current{
      background:#dfe6ff;
      color:#0a0d14;
    }

    .works-dial{
      position:absolute;
      top:56px;
      right:8px;
      bottom:14px;
      width:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
      touch-action:none;
    }

    .dial-track{
      position:relative;
      width:18px;
      height:100%;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .dial-thumb{
      position:absolute;
      left:50%;
      width:18px;
      height:68px;
      border-radius:999px;
      transform:translateX(-50%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(213,220,241,.92));
      box-shadow:
        0 10px 24px rgba(0,0,0,.28),
        0 0 0 1px rgba(255,255,255,.35) inset;
    }

    .dial-thumb::before{
      content:"";
      position:absolute;
      inset:12px 5px;
      border-radius:999px;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(35,40,50,.28) 0 3px,
          transparent 3px 8px
        );
      opacity:.75;
    }

    .reader{
      display:grid;
      gap:12px;
    }

    .reader-anchor{ display:block; width:100%; height:1px; }

    .image-wrap{
      border:1px solid var(--stroke);
      border-radius:20px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:#000;
    }

    .image-wrap img{
      display:block;
      width:100%;
      height:auto;
      background:#000;
    }

    .chapter-meta{
      padding:14px 16px;
      display:grid;
      gap:10px;
    }

    .meta-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:space-between;
    }

    .chapter-tag{
      display:inline-flex;
      align-items:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      line-height:1;
    }

    .chapter-note,
    .note{
      color:var(--muted);
      line-height:1.65;
      font-size:14px;
    }

    .note{
      padding:14px 16px;
    }

    .traversal-shell{
      padding:14px;
      display:grid;
      gap:10px;
    }

    .traversal-kicker{
      margin:0;
      color:var(--muted2);
      text-align:center;
      font-family:var(--subtitle-font);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .traversal-bar{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:8px;
    }

    .traversal-pill{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:#fff;
      color:#0f1219;
      min-height:42px;
      padding:0 10px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
      line-height:1;
      font-weight:700;
      box-shadow:0 8px 22px rgba(255,255,255,.12);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .traversal-pill:disabled{
      opacity:.45;
      cursor:default;
      box-shadow:none;
    }

    .chapter-progress-chip{
      position:fixed;
      left:12px;
      right:12px;
      bottom:calc(12px + var(--safe-bottom));
      z-index:8000;
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      background:rgba(12,14,20,.84);
      backdrop-filter:blur(14px);
      box-shadow:0 22px 60px rgba(0,0,0,.42);
      padding:10px 12px;
      display:grid;
      gap:7px;
    }

    .chapter-progress-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }

    .chapter-progress-label{ color:var(--ink); }

    .chapter-progress-track{
      width:100%;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
    }

    .chapter-progress-fill{
      width:0%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, #ffffff, #ced9ff);
      transition:width .08s linear;
      box-shadow:0 0 14px rgba(255,255,255,.2);
    }

    .search-jump-fab{
      position:fixed;
      right:12px;
      bottom:calc(92px + var(--safe-bottom));
      z-index:8000;
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:#fff;
      color:#0f1219;
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      cursor:pointer;
      font-family:var(--pill-font);
      font-size:14px;
      font-weight:700;
      box-shadow:0 12px 28px rgba(255,255,255,.14);
    }
  </style>
</head>
<body data-reader-mode="mobile">
  <div class="page-progress" aria-hidden="true">
    <div class="page-progress-bar" id="pageProgressBar"></div>
  </div>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-copy">
        <p class="eyebrow">Archive Reader · Mobile</p>
        <h1 id="workTitle">Loading…</h1>
        <p>Clean scroll. Big pages. No false taps.</p>
      </div>
    </div>
  </header>

  <main class="mobile-shell">
    <section class="search-card" id="searchBarAnchor" aria-label="Reader search">
      <div class="search-row">
        <input
          id="chapterSearchInput"
          class="search-input"
          type="search"
          placeholder="Search works and chapters…"
          autocomplete="off"
        />
        <div class="search-stat" id="chapterSearchStat">Type to search</div>
      </div>
      <div class="search-results" id="chapterSearchResults"></div>
      <p class="search-helper">Pick a work, open its chapters, then jump straight into the reader.</p>
    </section>

    <section class="works-card" aria-label="Works navigation">
      <div class="works-header">
        <p class="works-title">Works</p>
        <p class="works-copy">Tap a title to open its chapters. Use the visible dial to glide down the list without stray presses.</p>
      </div>

      <div class="works-scroll-shell">
        <div class="works-scroll" id="worksNav"></div>
      </div>

      <div class="works-dial" id="worksDial" aria-hidden="true">
        <div class="dial-track" id="dialTrack">
          <div class="dial-thumb" id="dialThumb"></div>
        </div>
      </div>
    </section>

    <main class="reader" id="reader"></main>
  </main>

  <aside class="chapter-progress-chip" aria-label="Chapter progress">
    <div class="chapter-progress-top">
      <span class="chapter-progress-label" id="chapterProgressLabel">Chapter Progress</span>
      <span id="chapterProgressPercent">0%</span>
    </div>
    <div class="chapter-progress-track">
      <div class="chapter-progress-fill" id="chapterProgressFill"></div>
    </div>
  </aside>

  <button class="search-jump-fab" id="scrollToSearchBtn" type="button">Search</button>

  <script defer src="index.js"></script>
</body>
</html>
